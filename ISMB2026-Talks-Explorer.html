<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="color-scheme" content="light dark">
</head>
<body>
<title>ISMB 2026 · Talks Explorer</title>
<style>
:root{
  --bg:#fbfcfd; --panel:#ffffff; --panel-2:#f4f6f9; --ink:#141821; --muted:#5c6675; --faint:#8a94a4;
  --line:#e3e8ef; --line-2:#eef1f6; --accent:#3f57d6; --accent-ink:#2c3fb0; --accent-soft:#eef1fe;
  --hi:#3f57d6; --shadow:0 1px 2px rgba(20,24,33,.04),0 4px 16px rgba(20,24,33,.05);
  --chip-s:68%; --chip-bg-l:95%; --chip-bd-l:84%; --chip-fg-s:60%; --chip-fg-l:33%;
  --stripe-med:#c8cede;
}
@media (prefers-color-scheme:dark){
  :root{
    --bg:#0e1116; --panel:#161a22; --panel-2:#1b202a; --ink:#e7ebf2; --muted:#9aa4b4; --faint:#6b7484;
    --line:#242b37; --line-2:#1e242f; --accent:#8093ff; --accent-ink:#a7b4ff; --accent-soft:#1a2036;
    --hi:#8093ff; --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.35);
    --chip-s:42%; --chip-bg-l:20%; --chip-bd-l:32%; --chip-fg-s:72%; --chip-fg-l:80%;
    --stripe-med:#3a4252;
  }
}
:root[data-theme="light"]{
  --bg:#fbfcfd; --panel:#ffffff; --panel-2:#f4f6f9; --ink:#141821; --muted:#5c6675; --faint:#8a94a4;
  --line:#e3e8ef; --line-2:#eef1f6; --accent:#3f57d6; --accent-ink:#2c3fb0; --accent-soft:#eef1fe;
  --hi:#3f57d6; --shadow:0 1px 2px rgba(20,24,33,.04),0 4px 16px rgba(20,24,33,.05);
  --chip-s:68%; --chip-bg-l:95%; --chip-bd-l:84%; --chip-fg-s:60%; --chip-fg-l:33%; --stripe-med:#c8cede;
}
:root[data-theme="dark"]{
  --bg:#0e1116; --panel:#161a22; --panel-2:#1b202a; --ink:#e7ebf2; --muted:#9aa4b4; --faint:#6b7484;
  --line:#242b37; --line-2:#1e242f; --accent:#8093ff; --accent-ink:#a7b4ff; --accent-soft:#1a2036;
  --hi:#8093ff; --shadow:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.35);
  --chip-s:42%; --chip-bg-l:20%; --chip-bd-l:32%; --chip-fg-s:72%; --chip-fg-l:80%; --stripe-med:#3a4252;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
.mono{font-family:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-width:960px;margin:0 auto;padding:0 18px 80px}

/* header — scrolls away (not sticky); day tabs stay sticky */
header{background:var(--bg);border-bottom:1px solid var(--line)}
.head-inner{max-width:960px;margin:0 auto;padding:16px 18px 13px}
.title-row{display:flex;align-items:baseline;justify-content:space-between;gap:12px;flex-wrap:wrap}
h1{font-size:20px;font-weight:680;letter-spacing:-.02em;margin:0}
h1 .yr{color:var(--accent)}
.sub{color:var(--muted);font-size:12.5px;margin-top:3px}
.sub b{color:var(--ink);font-weight:600}
.theme-btn{border:1px solid var(--line);background:var(--panel);color:var(--muted);border-radius:8px;
  padding:5px 9px;font-size:12px;cursor:pointer}
.theme-btn:hover{color:var(--ink);border-color:var(--faint)}

.legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:11px}
.leg{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--chip-bd);
  background:var(--chip-bg);color:var(--chip-fg);border-radius:999px;padding:3px 9px 3px 8px;
  font-size:11.5px;cursor:pointer;user-select:none;transition:opacity .12s,transform .05s;white-space:nowrap;
  --chip-bg:hsl(var(--h) var(--chip-s) var(--chip-bg-l));--chip-fg:hsl(var(--h) var(--chip-fg-s) var(--chip-fg-l));--chip-bd:hsl(var(--h) var(--chip-s) var(--chip-bd-l))}
.leg .dot{width:8px;height:8px;border-radius:50%;background:var(--chip-fg)}
.leg .n{font-family:ui-monospace,monospace;opacity:.7;font-size:10.5px}
.leg[aria-pressed="false"]{opacity:.36}
.leg:active{transform:translateY(1px)}

.controls{display:flex;gap:8px;align-items:center;margin-top:11px;flex-wrap:wrap}
.search{flex:1;min-width:170px;display:flex;align-items:center;gap:7px;border:1px solid var(--line);
  background:var(--panel);border-radius:9px;padding:7px 11px}
.search input{border:0;outline:0;background:transparent;color:var(--ink);font-size:13.5px;width:100%}
.search svg{width:14px;height:14px;color:var(--faint);flex:none}
.seg{display:flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--panel)}
.seg button{border:0;background:transparent;color:var(--muted);padding:7px 12px;font-size:12.5px;cursor:pointer}
.seg button.on{background:var(--accent-soft);color:var(--accent-ink);font-weight:600}
.txt-btn{border:1px solid var(--line);background:var(--panel);color:var(--muted);border-radius:9px;
  padding:7px 11px;font-size:12.5px;cursor:pointer;white-space:nowrap}
.txt-btn:hover{color:var(--ink)}
.txt-btn.on{background:#fef3c7;border-color:#f6c445;color:#8a5a00}
@media (prefers-color-scheme:dark){.txt-btn.on{background:#3a2f12;border-color:#a5822b;color:#f4cd6b}}
:root[data-theme="dark"] .txt-btn.on{background:#3a2f12;border-color:#a5822b;color:#f4cd6b}
:root[data-theme="light"] .txt-btn.on{background:#fef3c7;border-color:#f6c445;color:#8a5a00}
#savedN{font-family:ui-monospace,monospace;font-size:11px;opacity:.8}
/* bookmark star on each row */
.p-titlerow{display:flex;align-items:flex-start;gap:8px}
.p-titlerow .p-title{flex:1;min-width:0}
.bm{flex:none;border:0;background:transparent;cursor:pointer;padding:0 2px;line-height:1;
  font-size:16px;color:var(--faint);transition:color .12s,transform .05s}
.bm:hover{color:#f6c445}
.bm.on{color:#f6a917}
.bm:active{transform:scale(1.2)}

/* sticky day tabs */
.tabbar{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 90%,transparent);
  backdrop-filter:saturate(1.4) blur(10px);border-bottom:1px solid var(--line)}
.tabs{max-width:960px;margin:0 auto;display:flex;gap:4px;padding:8px 18px}
.tab{flex:1;border:1px solid var(--line);background:var(--panel);border-radius:11px;padding:9px 8px;
  cursor:pointer;text-align:center;transition:border-color .12s,background .12s}
.tab:hover{border-color:var(--faint)}
.tab.on{border-color:var(--accent);background:var(--accent-soft)}
.tab .d{font-weight:640;font-size:14px;letter-spacing:-.01em}
.tab.on .d{color:var(--accent-ink)}
.tab .c{font-size:11px;color:var(--muted);margin-top:2px;font-family:ui-monospace,monospace}

.bar{display:flex;align-items:center;gap:10px;margin:16px 2px 2px}
.bar .lbl{font-size:11px;font-weight:640;letter-spacing:.09em;text-transform:uppercase;color:var(--faint)}
.bar .ln{flex:1;height:1px;background:var(--line)}

/* session / orals card */
.session{border:1px solid var(--line);border-radius:13px;background:var(--panel);margin-top:11px;
  box-shadow:var(--shadow);overflow:hidden}
.session.orals{border-color:var(--accent);border-left-width:3px}
.s-head{display:flex;align-items:center;gap:11px;padding:13px 15px;cursor:pointer;list-style:none}
.s-head::-webkit-details-marker{display:none}
.s-head:hover{background:var(--panel-2)}
.caret{width:15px;height:15px;color:var(--faint);flex:none;transition:transform .18s}
details[open] .caret{transform:rotate(90deg)}
.s-name{font-weight:640;font-size:14.5px;letter-spacing:-.01em}
.orals .s-name{color:var(--accent-ink)}
.s-time{color:var(--muted);font-size:12px;margin-left:2px}
.s-count{margin-left:auto;font-family:ui-monospace,monospace;font-size:11.5px;color:var(--muted);
  background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:2px 9px;flex:none}
.s-body{border-top:1px solid var(--line-2)}

.row{display:grid;grid-template-columns:54px 1fr;gap:0 12px;padding:12px 15px 12px 0;
  border-bottom:1px solid var(--line-2);position:relative}
.row:last-child{border-bottom:0}
.row::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--stripe-med)}
.row.hi::before{background:var(--hi)}
.pnum{font-family:ui-monospace,monospace;font-size:12.5px;color:var(--muted);text-align:right;
  padding-top:2px;font-variant-numeric:tabular-nums}
.pnum .h{display:block;font-size:9px;color:var(--faint);letter-spacing:.04em;margin-bottom:2px}
.pnum .tm{display:block;font-size:9.5px;color:var(--faint);margin-top:2px}
.p-main{min-width:0}
.p-title{font-weight:570;font-size:14px;line-height:1.35;letter-spacing:-.005em}
.p-auth{color:var(--faint);font-size:11.5px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.p-track{color:var(--faint);font-size:11px;margin-top:2px}
.p-reason{color:var(--muted);font-size:12.5px;margin-top:5px;line-height:1.45}
.p-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.chip{--chip-bg:hsl(var(--h) var(--chip-s) var(--chip-bg-l));
  --chip-fg:hsl(var(--h) var(--chip-fg-s) var(--chip-fg-l));
  --chip-bd:hsl(var(--h) var(--chip-s) var(--chip-bd-l));
  display:inline-flex;align-items:center;gap:5px;background:var(--chip-bg);color:var(--chip-fg);
  border:1px solid var(--chip-bd);border-radius:6px;padding:2px 7px;font-size:10.5px;
  font-family:ui-monospace,monospace;letter-spacing:.01em;white-space:nowrap}
.chip .dot{width:6px;height:6px;border-radius:50%;background:var(--chip-fg);opacity:.85}

.empty{padding:34px 16px;text-align:center;color:var(--muted);font-size:13.5px}
.foot{margin-top:26px;padding-top:16px;border-top:1px solid var(--line);color:var(--faint);font-size:11.5px;line-height:1.6}

@media (max-width:560px){
  .row{grid-template-columns:46px 1fr;gap:0 9px}
  .tab .d{font-size:12.5px}
  h1{font-size:17px}
  .head-inner{padding:12px 14px 11px}
  .wrap{padding:0 12px 70px}
  .tabs{padding:8px 12px}
  /* legend wraps so every category is visible at once; the whole header scrolls away */
  .legend{gap:5px}
  .leg{font-size:11px;padding:3px 8px}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

{"num": 540, "id": "ICBO-22", "url": "https://icbo-conference.github.io/icbo2026/agenda/", "title": "Cell Workshop", "authors": "", "time": "09:00-17:00", "room": "Monroe", "cat": "ICBO 2026 · Biological & Biomedical Ontology (co-located separate conference)", "tags": ["Workshop"], "reason": "Workshop · Monroe · In person"}]}]}]}</script>
<script>
const DATA = JSON.parse(document.getElementById('data').textContent);
// Category list + hues come from the data (DATA.categories, in display order).
// Fallback: derive distinct categories from the items and spread hues by golden angle.
let CATS = DATA.categories;
if(!CATS || !CATS.length){
  const seen=[]; DATA.days.forEach(d=>{
    d.sessions.forEach(s=>s.posters.forEach(p=>{if(!seen.includes(p.cat))seen.push(p.cat);}));
    (d.orals||[]).forEach(o=>{if(!seen.includes(o.cat))seen.push(o.cat);});});
  CATS = seen.map((name,i)=>({name,hue:Math.round((i*137.508)%360)}));
}
const HUE = Object.fromEntries(CATS.map(c=>[c.name,c.hue]));
const ORAL_URL = id => `#`;

const state = {day:0, q:'', cats:new Set(Object.keys(HUE)), expanded:false, saved:false};

// ---- Bookmarks: persisted in localStorage (survives reloads; no server/cookies).
const SAVED_KEY='ismb2026_bookmarks';
let saved=new Set();
try{ saved=new Set(JSON.parse(localStorage.getItem(SAVED_KEY)||'[]')); }catch(e){}
function persist(){ try{ localStorage.setItem(SAVED_KEY,JSON.stringify([...saved])); }catch(e){} }
function updSavedN(){ document.getElementById('savedN').textContent=saved.size; }

// counts (posters + orals) by category
const catCounts={}; let NPOST=0, NORAL=0;
DATA.days.forEach(d=>{
  d.sessions.forEach(s=>s.posters.forEach(p=>{catCounts[p.cat]=(catCounts[p.cat]||0)+1;NPOST++;}));
  (d.orals||[]).forEach(o=>{catCounts[o.cat]=(catCounts[o.cat]||0)+1;NORAL++;});
});

document.getElementById('sub').innerHTML =
  `<b>${NPOST}</b> talks across <b>${CATS.length}</b> tracks · toggle a track chip to switch · ISMB 2026 + co-located ICBO · Jul 12–17`;

const NCATS=Object.keys(HUE).length;
const legend=document.getElementById('legend');
const legEls=[];
Object.keys(HUE).sort((a,b)=>(catCounts[b]||0)-(catCounts[a]||0)).forEach(cat=>{
  const el=document.createElement('button');
  el.className='leg'; el.style.setProperty('--h',HUE[cat]); el.setAttribute('aria-pressed','true');
  el.innerHTML=`<span class="dot"></span>${cat}<span class="n">${catCounts[cat]||0}</span>`;
  el.onclick=()=>{ state.cats.has(cat)?state.cats.delete(cat):state.cats.add(cat);
    el.setAttribute('aria-pressed', state.cats.has(cat)?'true':'false'); syncSelBtn(); render(); };
  legEls.push({cat,el});
  legend.appendChild(el);
});
function syncLegend(){ legEls.forEach(({cat,el})=>el.setAttribute('aria-pressed', state.cats.has(cat)?'true':'false')); }
function syncSelBtn(){ selBtn.textContent = state.cats.size===NCATS ? 'Clear all' : 'Select all'; }
const selBtn=document.getElementById('selBtn');
selBtn.onclick=()=>{
  if(state.cats.size===NCATS) state.cats.clear();
  else Object.keys(HUE).forEach(c=>state.cats.add(c));
  syncLegend(); syncSelBtn(); render();
};
syncSelBtn();

const tabs=document.getElementById('tabs');
const tabCountEls=[];
DATA.days.forEach((d,i)=>{
  const el=document.createElement('button');
  el.className='tab'+(i===0?' on':'');
  el.innerHTML=`<div class="d">${d.date}</div><div class="c"><span class="cn">0</span> talks</div>`;
  el.onclick=()=>{state.day=i;[...tabs.children].forEach(c=>c.classList.remove('on'));el.classList.add('on');
    window.scrollTo({top:0});render();};
  tabs.appendChild(el);
  tabCountEls.push(el.querySelector('.cn'));
});
// day-tab counts reflect the CURRENT filters (selected tracks, tier, saved, search)
function updateTabCounts(){
  DATA.days.forEach((d,i)=>{
    let n=0;
    d.sessions.forEach(s=>{ for(const p of s.posters) if(match(p)) n++; });
    (d.orals||[]).forEach(o=>{ if(match(o)) n++; });
    if(tabCountEls[i]) tabCountEls[i].textContent=n;
  });
}

document.getElementById('q').oninput=e=>{state.q=e.target.value.toLowerCase().trim();render();};
const toggleAll=document.getElementById('toggleAll');
toggleAll.onclick=()=>{state.expanded=!state.expanded;
  toggleAll.textContent=state.expanded?'Collapse all':'Expand all';render();};
const savedBtn=document.getElementById('savedBtn');
savedBtn.onclick=()=>{state.saved=!state.saved;savedBtn.classList.toggle('on',state.saved);render();};

// Download the current page as a self-contained .html file (works anywhere:
// GitHub Pages, opened locally, or the hosted artifact — no server needed).
document.getElementById('dl').onclick=()=>{
  const html='<!doctype html>\n'+document.documentElement.outerHTML;
  const blob=new Blob([html],{type:'text/html;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='ISMB2026-Talks-Explorer.html';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href),1000);
};

const root=document.documentElement;
document.getElementById('theme').onclick=()=>{
  const cur=root.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  root.setAttribute('data-theme',cur==='dark'?'light':'dark');};

function match(p){
  if(state.saved && !saved.has(p.id))return false;
  if(!state.cats.has(p.cat))return false;
  if(state.q){const hay=(p.title+' '+p.authors+' '+(p.tags?p.tags.join(' '):p.tag)+' '+p.reason).toLowerCase();
    if(!hay.includes(state.q))return false;}
  return true;
}
// force-open a details when searching/filtering so matches are visible
function openState(){ return state.expanded || !!state.q || state.saved || state.cats.size<Object.keys(HUE).length; }
const trackCode=t=>{const m=(t||'').match(/Oral\s+(\S+)/);return m?m[1]:'';};

const daysEl=document.getElementById('days');
function render(){
  updateTabCounts();
  const day=DATA.days[state.day];
  const open=openState();
  daysEl.innerHTML=''; let shown=0;

  // ---- Orals strip
  const orals=(day.orals||[]).filter(match);
  if(orals.length){
    shown+=orals.length;
    const det=document.createElement('details'); det.className='session orals'; det.open=open;
    const rows=orals.map(o=>{
      const chip=`<span class="chip" style="--h:${HUE[o.cat]}"><span class="dot"></span>${esc(o.tag)}</span>`;
      return `<div class="row ${o.tier==='high'?'hi':''}">
        <div class="pnum">${esc(trackCode(o.track))}<span class="tm">${esc(o.time.replace(' ',''))}</span></div>
        <div class="p-main">
          <div class="p-title"><a href="${ORAL_URL(o.id)}" target="_blank" rel="noopener">${esc(o.title)}</a></div>
          <div class="p-auth">${esc(o.authors)}</div>
          <div class="p-track">${esc(o.track)}</div>
          <div class="p-tags">${chip}</div>
          <div class="p-reason">${esc(o.reason)}</div>
        </div></div>`;
    }).join('');
    det.innerHTML=`<summary class="s-head">
        <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m9 6 6 6-6 6"/></svg>
        <span class="s-name">★ Oral talks</span><span class="s-time">across the day</span>
        <span class="s-count">${orals.length}</span></summary><div class="s-body">${rows}</div>`;
    daysEl.appendChild(det);
    const b=document.createElement('div'); b.className='bar';
    b.innerHTML='<span class="lbl">Poster sessions</span><span class="ln"></span>';
    daysEl.appendChild(b);
  }

  // ---- Poster sessions
  day.sessions.forEach(s=>{
    const ps=s.posters.filter(match);
    if(!ps.length)return;
    shown+=ps.length;
    const det=document.createElement('details'); det.className='session'; det.open=open;
    const rows=ps.map(p=>{
      const tags=p.tags.map(t=>`<span class="chip" style="--h:${HUE[p.cat]}"><span class="dot"></span>${esc(t)}</span>`).join('');
      const tm=(p.time||'').split('-')[0];
      const on=saved.has(p.id);
      return `<div class="row">
        <div class="pnum"><span class="h">TIME</span>${esc(tm)}</div>
        <div class="p-main">
          <div class="p-titlerow">
            <a class="p-title" href="${esc(p.url||'#')}" target="_blank" rel="noopener">${esc(p.title)}</a>
            <button class="bm ${on?'on':''}" data-id="${esc(p.id)}" title="Bookmark this talk" aria-label="Bookmark">${on?'★':'☆'}</button>
          </div>
          <div class="p-auth">${esc(p.authors)}</div>
          <div class="p-tags">${tags}</div>
          <div class="p-reason">${esc(p.reason)}</div>
        </div></div>`;
    }).join('');
    det.innerHTML=`<summary class="s-head">
        <svg class="caret" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="m9 6 6 6-6 6"/></svg>
        <span class="s-name">${esc(s.name)}</span><span class="s-time">${esc(s.time)}</span>
        <span class="s-count">${ps.length}</span></summary><div class="s-body">${rows}</div>`;
    daysEl.appendChild(det);
  });
  if(!shown)daysEl.innerHTML=`<div class="empty">No sessions match these filters on ${day.date}.</div>`;
}
function esc(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

// star clicks (event delegation — survives re-renders)
daysEl.addEventListener('click',e=>{
  const b=e.target.closest('.bm'); if(!b)return;
  e.preventDefault();
  const id=b.dataset.id;
  if(saved.has(id))saved.delete(id); else saved.add(id);
  persist(); updSavedN();
  b.classList.toggle('on',saved.has(id));
  b.textContent=saved.has(id)?'★':'☆';
  if(state.saved)render();  // in saved-only view, un-bookmarking removes the row
});

updSavedN();
render();
document.getElementById('foot').innerHTML=
  `<b>Scheduled talks only</b> — posters are not listed here; browse them on the `+
  `<a href="https://www.iscb.org/ismb2026/scientific-programme/posters" target="_blank" rel="noopener">ISMB posters page</a>. `+
  `Each track is a colored chip (legend) and a collapsible section — toggle chips to switch between tracks. `+
  `Click the ☆ on any talk to bookmark it, then hit <b>★ Saved</b> to see only your picks (saved in this browser). `+
  `Titles link to the ISMB / ICBO schedule. Filtering, searching, or Saved auto-expands sections.`;
</script>

</body>
</html>
